<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Padrón de Proveedores | Atlixco</title>

    <link rel="canonical" href="https://padron.digital/" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/style-modales.css" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      #nav-placeholder {
        min-height: 65px;
      }
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
      }
      .btn-buscar {
        background-color: #ab0a3d;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
      }
      .btn-nueva {
        background-color: #bc955c;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
      }
      .cuadro-blanco {
        background: white;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div id="nav-placeholder"></div>

    <main>
      <section class="seccion-catalogo">
        <div class="titulo-seccion">CONSULTAR <span>HISTORIAL</span></div>

        <div id="Historial" class="container">
          <div class="cuadro-blanco shadow-sm">
            <form id="FormHistorias" class="form-horizontal">
              <div class="form-group row">
                <label for="Anio" class="col-sm-1 control-label Etiqueta"
                  >Año:</label
                >
                <div class="col-sm-3">
                  <select class="form-control delgado" id="Anio">
                    <option value="0">Seleccione...</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                  </select>
                </div>

                <label for="Folio" class="col-sm-1 control-label Etiqueta"
                  >Folio:</label
                >
                <div class="col-sm-3">
                  <input
                    type="text"
                    class="form-control delgado InputMayus"
                    id="Folio"
                    placeholder="FOLIO"
                  />
                </div>

                <label for="RFC" class="col-sm-1 control-label Etiqueta"
                  >RFC:</label
                >
                <div class="col-sm-3">
                  <input
                    type="text"
                    class="form-control delgado InputMayus"
                    id="RFC"
                    placeholder="RFC"
                    maxlength="13"
                  />
                </div>
              </div>

              <div class="form-group row">
                <label for="RazonSocial" class="col-sm-2 control-label Etiqueta"
                  >Razón Social:</label
                >
                <div class="col-sm-4">
                  <input
                    type="text"
                    class="form-control delgado InputMayus"
                    id="RazonSocial"
                    placeholder="RAZON SOCIAL"
                  />
                </div>

                <label
                  for="NombreComercial"
                  class="col-sm-2 control-label Etiqueta"
                  >Nombre Comercial:</label
                >
                <div class="col-sm-4">
                  <input
                    type="text"
                    class="form-control delgado InputMayus"
                    id="NombreComercial"
                    placeholder="NOMBRE COMERCIAL"
                  />
                </div>
              </div>

              <div class="form-group row">
                <label for="SelectGiro" class="col-sm-2 control-label Etiqueta"
                  >Giro:</label
                >
                <div class="col-sm-4">
                  <select
                    class="form-control delgado"
                    id="SelectGiro"
                    onchange="actualizarLineas()"
                  >
                    <option value="0">Seleccione...</option>
                  </select>
                </div>

                <label for="LineaSel" class="col-sm-2 control-label Etiqueta"
                  >Línea:</label
                >
                <div class="col-sm-4">
                  <select class="form-control delgado" id="LineaSel" disabled>
                    <option value="0">Seleccione...</option>
                  </select>
                </div>
              </div>

              <div class="btn-contenedor text-center mt-4">
                <button type="button" class="btn-buscar" onclick="Consultar()">
                  <i class="fas fa-search"></i> BUSCAR
                </button>
                <button
                  type="button"
                  class="btn-nueva"
                  onclick="location.reload()"
                >
                  <i class="fas fa-sync"></i> NUEVA BÚSQUEDA
                </button>
              </div>
            </form>
          </div>

          <!-- CONTENEDOR DE RESULTADOS DINÁMICOS -->
          <div id="contenedor-resultados" class="mt-5 pb-5"></div>
        </div>
      </section>
    </main>

    <!-- CARGA DE SCRIPTS EN ORDEN LÓGICO -->
    <script src="js/conexion-supabase.js"></script>
    <script src="js/gestion-historial.js"></script>
    <script src="js/menuindex.js"></script>

    <div id="footer-placeholder"></div>
  </body>
</html>
