<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actualizar Contraseña | Padrón de Proveedores</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      #nav-placeholder {
        min-height: 65px;
      }
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
        background-color: #f4f4f4;
      }

      .btn-guardar {
        background-color: #ab0a3d;
        color: white;
        border: 2px solid #ab0a3d;
        padding: 8px 25px;
        border-radius: 5px;
        font-weight: bold;
        transition: all 0.3s ease;
      }
      .btn-guardar:hover:not(:disabled) {
        background-color: #7d072d;
        border-color: #7d072d;
        color: white;
      }
      .btn-guardar:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-cancelar {
        background-color: #bc955c;
        color: white;
        border: 2px solid #bc955c;
        padding: 8px 25px;
        border-radius: 5px;
        font-weight: bold;
        transition: all 0.3s ease;
      }
      .btn-cancelar:hover {
        background-color: #6c757d;
        border-color: #6c757d;
        color: white;
        text-decoration: none;
      }

      .cuadro-blanco {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        margin: 50px auto;
      }
    </style>
  </head>
  <body>
    <div id="nav-placeholder"></div>

    <main class="container">
      <div class="cuadro-blanco">
        <h4 class="text-center mb-4" style="color: #ab0a3d">
          ESTABLECER NUEVA CONTRASEÑA
        </h4>
        <p class="text-muted text-center small">
          Por favor, ingrese su nueva contraseña de acceso.
        </p>

        <form id="FormActualizar">
          <div class="form-group">
            <label>Nueva Contraseña:</label>
            <input
              type="password"
              id="Pass1"
              class="form-control"
              placeholder="Mínimo 6 caracteres"
              oninput="validarPasswords()"
            />
          </div>
          <div class="form-group">
            <label>Confirmar Contraseña:</label>
            <input
              type="password"
              id="Pass2"
              class="form-control"
              placeholder="Repita su contraseña"
              oninput="validarPasswords()"
            />
          </div>

          <div
            id="msg-error"
            class="text-danger small mb-3 text-center"
            style="display: none"
          >
            Las contraseñas no coinciden.
          </div>

          <div class="text-center mt-4">
            <button
              type="button"
              id="BotonGuardar"
              class="btn-guardar w-100 mb-2"
              disabled
              onclick="actualizarPassword()"
            >
              <i class="fas fa-save"></i> GUARDAR CAMBIOS
            </button>
            <a href="index.html" class="btn-cancelar d-block">CANCELAR</a>
          </div>
        </form>
      </div>
    </main>

    <script src="js/conexion-supabase.js"></script>
    <script src="js/gestion-password.js"></script>
    <script src="js/menuindex.js"></script>
  </body>
</html>
