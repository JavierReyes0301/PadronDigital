<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Padrón de Proveedores - Admin</title>

    <link
      rel="icon"
      href="https://onckgyxtttcbddezmnsj.supabase.co/storage/v1/object/public/LOGO/Logotipo%20sin%20fondo.png"
    />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <link rel="stylesheet" href="admin-panel.css" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      /* Se mantienen solo los estilos del botón flotante y modales de SweetAlert */
      .admin-tools-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
      }
      .btn-float-secret {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #323232;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        opacity: 0.3;
        transition: all 0.3s;
      }
      .btn-float-secret:hover {
        opacity: 1;
        transform: scale(1.1);
        background-color: #ab0a3d; /* Guinda institucional */
      }
      .modal-institucional-admin {
        border-radius: 25px !important;
        overflow: hidden !important;
      }
    </style>
  </head>

  <body>
    <div class="admin-tools-float">
      <div class="btn-float-secret" title="Gestión de Sistema">
        <i class="fas fa-user-shield"></i>
      </div>
    </div>

    <main>
      <section id="seccion-admin-dashboard" class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center">
          <h2 class="titulo-admin">Panel de Control - Administración</h2>
          <button class="btn btn-logout" id="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
          </button>
        </div>
        <hr class="hr-dorada-admin" />

        <div class="row mb-4">
          <div class="col-md-3">
            <div class="card card-metric">
              <h5>Total Proveedores</h5>
              <h2 id="count-total">0</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card card-metric">
              <h5>Pendientes Revisión</h5>
              <h2 id="count-pendientes">0</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card card-metric">
              <h5>Validados</h5>
              <h2 id="count-validados">0</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card card-metric">
              <h5>Rechazados</h5>
              <h2 id="count-rechazados">0</h2>
            </div>
          </div>
        </div>

        <div class="card-tabla-container">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="font-weight-bold text-uppercase" style="color: #323232"
              >Listado de Expedientes</span
            >
            <input
              type="text"
              id="busqueda-admin"
              class="form-control w-25"
              placeholder="Buscar por RFC o Nombre..."
            />
          </div>

          <div class="table-responsive p-0">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>RFC</th>
                  <th>Nombre / Razón Social</th>
                  <th>Tipo</th>
                  <th>Folio</th>
                  <th>Estatus</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tabla-proveedores-admin"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="admin/gestion-admin.js"></script>
  </body>
</html>
