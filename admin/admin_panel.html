<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Padrón de Proveedores</title>
    <link
      rel="icon"
      href="https://onckgyxtttcbddezmnsj.supabase.co/storage/v1/object/public/LOGO/Logotipo%20sin%20fondo.png"
    />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link rel="stylesheet" href="admin-panel.css" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      #nav-placeholder {
        min-height: 65px;
      }
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
        background-color: #f8f9fa;
      }

      /* DISEÑO DE TARJETAS MÉTRICAS */
      .card {
        border-radius: 15px;
        border: none;
      }
      .bg-guinda {
        background-color: #ab0a3d !important;
      }

      /* BOTÓN FLOTANTE DISCRETO (ADMIN MANAGEMENT) */
      .admin-tools-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
      }
      .btn-float-secret {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #2c3e50; /* Color oscuro discreto */
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        opacity: 0.3; /* Casi invisible hasta que pasas el mouse */
        transition: all 0.3s;
      }
      .btn-float-secret:hover {
        opacity: 1;
        transform: scale(1.1);
        background-color: #ab0a3d;
      }

      /* Estilos para el modal institucional dentro del admin */
      .modal-institucional-admin {
        border-radius: 25px !important;
        overflow: hidden !important;
      }
      .input-institucional-admin {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #d1d9e6;
        border-radius: 10px;
        background-color: #f0f5ff !important;
      }
    </style>
  </head>
  <body>
    <div class="admin-tools-float">
      <div
        class="btn-float-secret"
        onclick="abrirGestionAdmins()"
        title="Gestión de Sistema"
      >
        <i class="fas fa-user-shield"></i>
      </div>
    </div>

    <main>
      <section id="seccion-admin-dashboard" class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center">
          <h2>Panel de Control - Administración de Proveedores</h2>
          <button
            class="btn btn-outline-danger btn-sm"
            onclick="
              window.clientSupa.auth
                .signOut()
                .then(() => (window.location.href = 'index.html'))
            "
          >
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
          </button>
        </div>
        <hr />

        <div class="row mb-4">
          <div class="col-md-3">
            <div class="card bg-primary text-white p-3 shadow-sm">
              <h5>Total Proveedores</h5>
              <h2 id="count-total">0</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card bg-warning text-dark p-3 shadow-sm">
              <h5>Pendientes Revisión</h5>
              <h2 id="count-pendientes">0</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card bg-success text-white p-3 shadow-sm">
              <h5>Validados</h5>
              <h2 id="count-validados">0</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card bg-danger text-white p-3 shadow-sm">
              <h5>Rechazados</h5>
              <h2 id="count-rechazados">0</h2>
            </div>
          </div>
        </div>

        <div class="card shadow">
          <div
            class="card-header bg-white d-flex justify-content-between align-items-center"
          >
            <span class="font-weight-bold text-uppercase"
              >Listado de Expedientes</span
            >
            <input
              type="text"
              id="busqueda-admin"
              class="form-control w-25"
              placeholder="Buscar por RFC o Nombre..."
            />
          </div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="thead-light">
                <tr>
                  <th>RFC</th>
                  <th>Nombre / Razón Social</th>
                  <th>Tipo</th>
                  <th>Folio</th>
                  <th>Estatus</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tabla-proveedores-admin"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin/gestion-admin.js"></script>
  </body>
</html>
