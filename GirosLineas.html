<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Padrón de Proveedores | Atlixco</title>

    <link rel="canonical" href="https://padron.digital/" />

    <link rel="stylesheet" href="css/style.css" />

    <link rel="stylesheet" href="css/style-modales.css" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <style>
      #nav-placeholder {
        min-height: 65px;
      }
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
      }
      .btn-buscar {
        background-color: #ab0a3d;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
      }
      .btn-nueva {
        background-color: #bc955c;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
      }
      .cuadro-blanco {
        background: white;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div id="nav-placeholder"></div>

    <main>
      <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

      <section id="giroslineas" class="container">
        <div class="titulo-seccion">CATÁLOGO DE <span>GIROS-LÍNEAS</span></div>

        <!-- Sección del Buscador -->
        <div class="container mb-4 busqueda-padron">
          <div class="row justify-content-center">
            <div class="col-md-6">
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text"
                    ><i class="fas fa-search"></i
                  ></span>
                </div>
                <input
                  type="text"
                  id="inputBuscador"
                  class="form-control shadow-none"
                  placeholder="Buscar por clave, giro o descripción..."
                  autocomplete="off"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="table-responsive" id="contenedor-tablas"></div>

        <div style="display: flex; justify-content: center; margin: 5px"></div>
      </section>
    </main>
    <script src="js/conexion-supabase.js"></script>
    <script src="js/gestion-catalogos.js"></script>
    <script src="js/menuindex.js"></script>

    <div id="footer-placeholder"></div>
  </body>
</html>
