<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Padrón de Proveedores</title>
    <link
      rel="icon"
      href="https://onckgyxtttcbddezmnsj.supabase.co/storage/v1/object/public/LOGO/Logotipo%20sin%20fondo.png"
    />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <link rel="preconnect" href="https://maopuzbvxucsarrydmte.supabase.co" />
    <link rel="canonical" href="https://padron.digital/" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/style-modales.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      #nav-placeholder {
        min-height: 65px;
      }
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
      }
      .icon-box {
        cursor: pointer;
        transition: transform 0.2s;
      }
      .icon-box:hover {
        transform: translateY(-5px);
        background-color: rgba(0, 0, 0, 0.02);
      }
      .icon-wrapper svg,
      .icon-svg svg,
      .btn svg,
      .flecha-guinda-unificada svg {
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <div id="nav-placeholder"></div>

    <main>
      <section class="section_banner" id="inicio">
        <div class="container-content">
          <div class="logo-container">
            <h1 class="logo-title text-center">H. AYUNTAMIENTO</h1>
            <a href="https://www.atlixco.gob.mx/Ayto">
              <img
                src="https://maopuzbvxucsarrydmte.supabase.co/storage/v1/object/public/Imag/logo_pontulogo.png"
                alt="Pon tu logo aqui"
                class="logo-img"
                loading="lazy"
              />
            </a>
          </div>
          <div class="banner-text">
            <h1 class="titulo">PADRÓN DE PROVEEDORES</h1>
            <p class="texto-p">
              Bienvenido al portal oficial del Padrón de Proveedores del
              Municipio...
            </p>
          </div>
        </div>
      </section>

      <section id="registro">
        <h2 class="titulo-seccion">REGISTRO Y <span>ACCESO</span></h2>
        <div class="container-universal">
          <div class="custom-main-box">
            <div class="custom-col-4">
              <div
                class="icon-box border-dashed"
                data-toggle="modal"
                data-target="#ModalRegistro"
              >
                <div class="icon-wrapper">
                  <svg
                    class="fa-flip-horizontal"
                    style="width: 100px; height: auto"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 512"
                  >
                    <path
                      d="M462.88 374.62a32 32 0 0 0 22.63 9.38H528a16 16 0 0 0 16-16v-42.46a32 32 0 0 0-9.38-22.63L303.19 71.47l-71.7 71.7zm-254-254l71.7-71.8L238.79 7a24.1 24.1 0 0 0-33.9 0L167 44.87a24 24 0 0 0 0 33.8zM608 160H437l120.27 120.28A64 64 0 0 1 576 325.54V400a16 16 0 0 1-16 16H104a8 8 0 0 1-8-8v-16a8 8 0 0 1 8-8h323l-64-64H104a8 8 0 0 1-8-8v-16a8 8 0 0 1 8-8h227L203 160H32a32 32 0 0 0-32 32v288a32 32 0 0 0 32 32h576a32 32 0 0 0 32-32V192a32 32 0 0 0-32-32z"
                    />
                  </svg>
                </div>
                <div class="project-name fnt700">
                  <p>
                    ¿No estás inscrito? <br /><strong>¡REGÍSTRATE AQUÍ!</strong>
                  </p>
                </div>
              </div>
            </div>

            <div class="custom-col-4">
              <div
                class="icon-box border-dashed"
                data-toggle="modal"
                data-target="#modalRequisitos"
              >
                <div class="icon-wrapper">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 384 512"
                    style="width: 80px; height: auto; margin-bottom: 15px"
                  >
                    <path
                      d="M192 0c-41.8 0-77.4 26.7-90.5 64H64C28.7 64 0 92.7 0 128V448c0 35.3 28.7 64 64 64H320c35.3 0 64-28.7 64-64V128c0-35.3-28.7-64-64-64H282.5C269.4 26.7 233.8 0 192 0zm0 64a32 32 0 1 1 0 64 32 32 0 1 1 0-64zM112 248l64 64 128-128 32 32-160 160-96-96 32-32z"
                    />
                  </svg>
                </div>
                <div class="project-name fnt700">
                  <p>Requisitos de inscripción</p>
                </div>
              </div>
            </div>

            <div class="custom-col-4">
              <div
                class="icon-box border-dashed"
                data-toggle="modal"
                data-target="#modalFormatos"
              >
                <div class="icon-wrapper">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 384 512"
                    style="width: 80px; height: auto"
                  >
                    <path
                      d="M224 136V0H24C10.7 0 0 10.7 0 24v464c0 13.3 10.7 24 24 24h336c13.3 0 24-10.7 24-24V160H248c-13.2 0-24-10.8-24-24zm76.45 211.36l-96.42 95.7c-6.65 6.61-17.39 6.61-24.04 0l-96.42-95.7C73.42 337.29 80.54 320 94.82 320H160v-80c0-8.84 7.16-16 16-16h32c8.84 0 16 7.16 16 16v80h65.18c14.28 0 21.4 17.29 11.27 27.36zM377 105L279.1 7c-4.5-4.5-10.6-7-17-7H256v128h128v-6.1c0-6.3-2.5-12.4-7-16.9z"
                    />
                  </svg>
                </div>
                <div class="project-name fnt700">
                  <p>Descarga de formatos</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="consultar">
        <h2 class="titulo-seccion">CONSULTAR</h2>
        <div class="container-universal">
          <div class="custom-main-box">
            <div class="custom-col-4">
              <div
                class="icon-box border-dashed js-link"
                data-url="Padron.html"
              >
                <div class="icon-wrapper">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 576 512"
                    style="width: 100px; height: auto"
                  >
                    <path
                      d="M528 32H48C21.5 32 0 53.5 0 80v16h576V80c0-26.5-21.5-48-48-48zM0 432c0 26.5 21.5 48 48 48h480c26.5 0 48-21.5 48-48V128H0v304zm352-232c0-4.4 3.6-8 8-8h144c4.4 0 8 3.6 8 8v16c0 4.4-3.6 8-8 8H360c-4.4 0-8-3.6-8-8v-16zm0 64c0-4.4 3.6-8 8-8h144c4.4 0 8 3.6 8 8v16c0 4.4-3.6 8-8 8H360c-4.4 0-8-3.6-8-8v-16zm0 64c0-4.4 3.6-8 8-8h144c4.4 0 8 3.6 8 8v16c0 4.4-3.6 8-8 8H360c-4.4 0-8-3.6-8-8v-16zM176 192c35.3 0 64 28.7 64 64s-28.7 64-64 64-64-28.7-64-64 28.7-64 64-64zM67.1 396.2C75.5 370.5 99.6 352 128 352h8.2c12.3 5.1 25.7 8 39.8 8s27.6-2.9 39.8-8h8.2c28.4 0 52.5 18.5 60.9 44.2 3.2 9.9-5.2 19.8-15.6 19.8H82.7c-10.4 0-18.8-10-15.6-19.8z"
                    />
                  </svg>
                </div>
                <div class="project-name fnt700"><p>Padrón 2026</p></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/conexion-supabase.js"></script>

    <script src="js/modales.js"></script>
    <script src="js/loginadmin.js"></script>

    <script
      src="https://www.google.com/recaptcha/api.js?onload=onloadCallback&render=explicit"
      async
      defer
    ></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const interactiveDivs = document.querySelectorAll(".js-link");
        interactiveDivs.forEach((div) => {
          div.style.cursor = "pointer";
          div.addEventListener("click", function () {
            const destination = this.getAttribute("data-url");
            if (destination) {
              window.location.href = destination;
            }
          });
        });
      });
    </script>
  </body>
</html>
